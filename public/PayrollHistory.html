<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Management</title>
    <link rel="stylesheet" href="PayrollHistory.css">
</head>

<body>

    <div class="container">

        <!-- Back Button -->
        <button class="back-button left" onclick="window.location.href='/payroll'">
            <span>&#8592;</span> Back
        </button>

        <!-- Header -->
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="Images/logo.png" alt="Logo" style="width: 60px; vertical-align: middle; margin-right: 10px;">
            <h1 class="header" style="display: inline; vertical-align: middle;">Payroll History</h1>
        </div>

        <!-- Search and Filter Section -->
        <div class="search-bar">
            <input type="text" id="searchPayroll" placeholder="Search by Name or ID" />
            <select id="departmentFilter">
                <option value="all">All Departments</option>
                <!-- Dynamically populated department options will go here -->
            </select>
            <select id="sortFilter">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="highest">Highest Pay</option>
                <option value="lowest">Lowest Pay</option>
            </select>
        </div>

        <!-- Export Button -->
        <div class="header-actions" style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <button class="action-btn" onclick="exportToPDF()"
                style="background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-file-pdf"></i> Export to PDF
            </button>
        </div>

        <!-- Payroll Table inside Scrollable Container -->
        <div class="table-container">
            <table id="payrollTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Allowance</th>
                        <th>Deduction</th>
                        <th>Net Pay</th>
                        <th>Pay Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be populated here -->
                    <tr>
                        <td colspan="9" style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- jsPDF and AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <!-- Link to JS file that handles search, filter, and dynamic content -->
    <script src="js/common.js"></script>
    <script src="/PayrollHistory.js"></script>

    <script>
        let payrollData = [];

        async function fetchPayrollHistory() {
            try {
                const response = await fetch('/api/get-payroll');
                const history = await response.json();
                payrollData = history; // Store data globally
                const tbody = document.querySelector('#payrollTable tbody');
                tbody.innerHTML = ''; // Clear loading message

                if (Array.isArray(history)) {
                    history.forEach(record => {
                        const displayId = record.branch_emp_id ? `B${record.branch_id}-${String(record.branch_emp_id).padStart(3, '0')}` : record.employee_id;
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${displayId}</td>
                            <td>${record.employee_name}</td>
                            <td>${record.department_name}</td>
                            <td>$${record.gross_pay}</td>
                            <td>$${record.allowances || '0.00'}</td>
                            <td>$${record.deductions || '0.00'}</td>
                            <td>$${record.net_pay}</td>
                            <td>${new Date(record.pay_date).toLocaleDateString()}</td>
                            <td>
                                <button class="action-btn email-btn" onclick="emailPayslip(${record.employee_id})" style="background: var(--secondary-color); color: white; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer;">
                                    <i class="fas fa-envelope"></i> Email
                                </button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="9" style="text-align: center;">No payroll history found.</td></tr>`;
                }
            } catch (error) {
                console.error('Error fetching payroll history:', error);
                const tbody = document.querySelector('#payrollTable tbody');
                tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: red;">Failed to load payroll history.</td></tr>`;
            }
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); // Landscape for more columns

            // Load logo
            const logoUrl = 'Images/logo.png';
            const logoImg = new Image();
            logoImg.src = logoUrl;

            logoImg.onload = function () {
                generatePDF(doc, logoImg);
            };

            logoImg.onerror = function () {
                console.error("Failed to load logo for PDF");
                generatePDF(doc, null);
            };
        }

        function generatePDF(doc, logoImg) {
            // Colors
            const primaryColor = [41, 128, 185]; // Blue
            const secondaryColor = [52, 73, 94]; // Dark Grey

            // Header Section
            if (logoImg) {
                doc.addImage(logoImg, 'PNG', 15, 10, 25, 25);
            }

            doc.setFontSize(22);
            doc.setTextColor(...primaryColor);
            doc.text("PAYROLL REPORT", 150, 25);

            doc.setFontSize(10);
            doc.setTextColor(...secondaryColor);
            doc.text("Payroll Management System", 15, 40);
            doc.text("123 Business Rd, Tech City", 15, 45);

            doc.setDrawColor(200, 200, 200);
            doc.line(15, 55, 280, 55); // Horizontal Line

            // Prepare Data for AutoTable
            const tableBody = payrollData.map(record => [
                record.branch_emp_id ? `B${record.branch_id}-${String(record.branch_emp_id).padStart(3, '0')}` : record.employee_id,
                record.employee_name,
                record.department_name,
                `$${record.gross_pay}`, // Basic
                `$${record.hra || '0.00'}`,
                `$${record.da || '0.00'}`,
                `$${record.pf || '0.00'}`,
                `$${record.professional_tax || '0.00'}`,
                `$${record.tax_deductions || '0.00'}`, // Income Tax
                `$${record.net_pay}`,
                new Date(record.pay_date).toLocaleDateString()
            ]);

            // Table Data
            doc.autoTable({
                head: [['ID', 'Name', 'Dept', 'Basic', 'HRA', 'DA', 'PF', 'Prof Tax', 'Inc Tax', 'Net Pay', 'Date']],
                body: tableBody,
                startY: 65,
                theme: 'grid',
                headStyles: { fillColor: primaryColor, textColor: 255, fontStyle: 'bold' },
                columnStyles: {
                    0: { fontStyle: 'bold' }, // ID
                    9: { fontStyle: 'bold', textColor: [46, 204, 113] } // Net Pay (Green)
                },
                styles: { fontSize: 8 }
            });

            // Footer
            const pageHeight = doc.internal.pageSize.height;
            const pageWidth = doc.internal.pageSize.width;
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text("Generated by Payroll Management System", 15, pageHeight - 10);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, pageWidth - 40, pageHeight - 10);

            doc.save('payroll_detailed_report.pdf');
        }

        async function emailPayslip(id) {
            if (!confirm('Are you sure you want to email the payslip to this employee?')) {
                return;
            }

            try {
                const response = await fetch('/api/email/payslip', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ emp_id: id })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`Email sent successfully! Preview: ${result.previewUrl}`);
                    window.open(result.previewUrl, '_blank');
                } else {
                    alert(`Failed to send email: ${result.message}`);
                }
            } catch (error) {
                console.error('Error sending email:', error);
                alert('An error occurred while sending the email.');
            }
        }

        document.addEventListener('DOMContentLoaded', fetchPayrollHistory);
    </script>

</body>

</html>
