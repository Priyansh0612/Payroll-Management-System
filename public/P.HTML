<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="P.css">
    <link rel="stylesheet" href="Toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <img src="Images/logo.png" alt="Logo" class="logo" style="width: 80px; margin-bottom: 15px;">
            <h2>Login</h2>
            <p>Please login to your account</p>
            <form id="loginForm" method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        style="padding-right: 40px;">
                    <i class="fas fa-eye" id="togglePassword"
                        style="position: absolute; right: 15px; top: 43px; cursor: pointer; color: #666;"></i>
                </div>
                <button type="submit">Login</button>
            </form>
            <div id="error-message" class="error-message"></div>
            <div class="login-footer">
                <p>Need access or create account? Please contact the system administrator at <a
                        href="mailto:priyanshp0612@gmail.com"><strong>priyanshp0612@gmail.com</strong></a> or call
                    <strong>+1-800-555-1234</strong>.
                </p>

                <div id="error-message" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </div>
    <script src="Toast.js"></script>
    <script src="P.JS"></script>
</body>

</html>
